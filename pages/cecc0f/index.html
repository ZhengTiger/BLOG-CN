DOI: <a href="https://doi.org/10.1038/s41592-022-01459-6" target="_blank" rel="noopener noreferrer">https://doi.org/10.1038/s41592-022-01459-6<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a><br>
Cite: Zeira, R., Land, M., Strzalkowski, A. et al. Alignment and integration of spatial transcriptomics
data. Nat Methods 19, 567–575 (2022).</p> <div class="custom-block note"><p class="custom-block-title">相关阅读</p> <p>微信公众号：<a href="https://mp.weixin.qq.com/s?__biz=MzkwMjM0MzA5MA==&amp;mid=2247488459&amp;idx=1&amp;sn=c30ef9a413729b465128d8b5ee2f3c83&amp;chksm=c0a7a316f7d02a008651c8b00cdbb64e8772e897904870542255a2806468f7e524aac77f4d71&amp;token=1392147927&amp;lang=zh_CN#rd" target="_blank" rel="noopener noreferrer">文献阅读 | Nature Methods：空间转录组数据的对齐和整合<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a></p></div> <p><strong>作者介绍：</strong></p> <table><thead><tr><th style="text-align:center;">Benjamin J. Raphael</th></tr></thead> <tbody><tr><td style="text-align:center;"><img src="https://www.cs.princeton.edu/sites/all/modules/custom/cs_people/generate_thumbnail.php?id=3893&amp;thumb=" width="200"></td></tr> <tr><td style="text-align:center;">美国普林斯顿大学</td></tr> <tr><td style="text-align:center;"><a href="mailto:braphael@princeton.edu">braphael@princeton.edu</a></td></tr></tbody></table> <h2 id="abstract"><a href="#abstract" class="header-anchor">#</a> Abstract</h2> <p>空间转录组学 (ST) 可测量组织切片中数千个 spots 的 mRNA 表达，同时记录每个 spot 的二维 (2D) 坐标。作者介绍 ST 实验的概率对齐 (PASTE)，这是一种对齐和集成来自多个相邻组织切片的 ST 数据的方法。PASTE 使用最佳传输公式计算切片的成对配准，该公式对转录相似性和 spots 之间的物理距离进行建模。PASTE 进一步组合成对配准来构建组织的堆叠 3D 配准。或者，PASTE 可以将多个 ST 切片集成到单个共识切片中。作者表明，PASTE 在模拟和真实 ST 数据中准确地配准相邻切片上的 spots，展示了使用转录相似性和空间信息的优势。作者进一步表明，与分析单个 ST 切片或忽略空间信息的现有方法相比，PASTE 集成切片提高了细胞类型和差异表达基因的识别。</p></div></div>  <div class="page-edit"><!----> <div class="tags"><a href="/tags/?tag=%E7%94
