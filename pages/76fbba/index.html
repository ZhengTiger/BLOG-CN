Cite: Lin, D., Hong, P., Zhang, S. et al. Digestion-ligation-only Hi-C is an efficient and cost-effective method for chromosome conformation capture. <em>Nat Genet</em> 50, 754–763 (2018).</p> <p><strong>作者介绍：</strong></p> <table><thead><tr><th style="text-align:center;">Gang Cao(曹罡)</th> <th style="text-align:center;">Guoliang Li(李国亮)</th></tr></thead> <tbody><tr><td style="text-align:center;"><img src="http://hzaml.hzau.edu.cn/__local/D/6A/CD/18DE8CF2DF6750578AEC844C744_80A8E1BB_23A53.png" width="200"></td> <td style="text-align:center;"><img src="https://coi.hzau.edu.cn/__local/B/E8/0D/F49D3C1302BEC33633D15F25B09_2DAD2201_25DE.jpg?e=..jpg" width="200"></td></tr> <tr><td style="text-align:center;">华中农业大学</td> <td style="text-align:center;">华中农业大学</td></tr> <tr><td style="text-align:center;"><a href="mailto:gcao@mail.hzau.edu.cn">gcao@mail.hzau.edu.cn</a></td> <td style="text-align:center;"><a href="mailto:guoliang.li@mail.hzau.edu.cn">guoliang.li@mail.hzau.edu.cn</a></td></tr></tbody></table> <h2 id="abstract"><a href="#abstract" class="header-anchor">#</a> Abstract</h2> <p>染色体构象捕获 (3C) 技术可用于研究 3D 基因组结构。然而，当前方法中的高背景噪声、高成本和缺乏直接的噪声评估阻碍了 3D 基因组研究的进步。在这里，我们开发了一种简单的仅消化连接的 Hi-C (digestion-ligation-only Hi-C，DLO Hi-C) 技术来探索基因组的 3D 结构。这种方法只需要两轮消化和连接，不需要生物素标记和下拉。通过纯化特定接头连接的 DNA 片段，以经济高效的步骤有效去除未连接的 DNA。值得注意的是，可以在测序前的早期质量控制步骤中快速评估随机连接。此外，还开发了使用四切割限制酶的原位 DLO Hi-C 版本。我们应用 DLO Hi-C 来描绘 THP-1 和 K562 细胞的基因组结构并发现染色体易位。这项技术可以促进基因组组织、基因调控和（元）基因组组装的研究。</p> <h2 id="results"><a href="#results" class="header-anchor">#</a> Results</h2> <h3 id="fig1-flowchart-of-the-digestion-ligation-only-hi-c-dlo-hi-c-method"><a href="#fig1-flowchart-of-the-digestion-ligation-only-hi-c-dlo-hi-c-method" class="header-anchor">#</a> Fig1. Flowchart of the digestion-ligation-only Hi-C (DLO Hi-C) method</h3> <p><img src="https://media.springernature.com/full/springer-static/image/art%3A10.1038%2Fs41588-018-0111-2/MediaObjects/41588_2018_111_Fig1_HTML.jpg?as=webp" alt="Fig1"></p> <div class="custom-block note"><p class="custom-block-title">Fig1. DLO Hi-C 方法的流程图</p> <p><strong>a.</strong> 细胞与EGS和甲醛双交联（step 1），然后用限制酶消化（step 2）。消化的染色质片段分成两管，通过同时消化和连接来连接不同的20bp半连接子（step 3），然后混合进行凝胶内接近连接（step 4）。连接的DNA被纯化并通过MmeI消化（step 5），释放出特异性的80-bp DLO Hi-C DNA片段。这些DLO Hi-C DNA片段与Illumina 接头连接，并进行高通量测序（step 6）。两轮消化和连接在图中都用方框强调。<br> <strong>b.</strong> 通过同时消化和连接末端反应将半连接子与消化的染色质连接的细节。</p></div> <h3 id="fig2-the-early-quality-control-step-in-the-dlo-hi-c-method"><a href="#fig2-the-early-quality-control-step-in-the-dlo-hi-c-method" class="header-anchor">#</a> Fig2. The early quality-control step in the DLO Hi-C method</h3> <p><img src="https://media.springernature.com/full/springer-static/image/art%3A10.1038%2Fs41588-018-0111-2/MediaObjects/41588_2018_111_Fig2_HTML.jpg?as=webp" alt="Fig2"></p> <div class="custom-block note"><p class="custom-block-title">Fig2. DLO Hi-C 方法中的早期质量控制步骤</p> <p><strong>a.</strong> 消化的染色质与两种不同的半连接子（linker A 和 linker B）结合，并混合用于凝胶内邻近连接。分子内连接可以在连接的完整连接子中形成HindIII或ClaI消化位点，而分子间的半连接子随机连接不能形成这些限制性酶切位点。<br> <strong>b.</strong> 通过ClaI和HindIII对DLO Hi-C文库的双消化，以快速早期评估DLO Hi-C信噪比。该实验已经独立重复了六次，结果相似。<br> <strong>c.</strong> 有无ClaI和HindIII消化的200-bp DLO Hi-C库DNA带的平均灰度值（n=6 独立实验）。通过双尾匹配对t检验推导出了P值。在箱线图中，中心线表示中值和框的限制是独立实验的上和下每像素平均灰度值。每个像素的平均灰度值由ImageJ软件定义（v1.8.0）。ROI, region of interest。</p></div> <h3 id="fig3-dlo-hi-c-data-analysis-workflow-and-comparison-of-dlo-hi-c-in-situ-hi-c-in-situ-dlo-hi-c-hi-c-and-dnase-hi-c-for-3d-genome-structure-analysis-of-k562-cells"><a href="#fig3-dlo-hi-c-data-analysis-workflow-and-comparison-of-dlo-hi-c-in-situ-hi-c-in-situ-dlo-hi-c-hi-c-and-dnase-hi-c-for-3d-genome-structure-analysis-of-k562-cells" class="header-anchor">#</a> Fig3. DLO Hi-C data analysis workflow and comparison of DLO Hi-C, in situ Hi-C, in situ DLO Hi-C, Hi-C, and DNase Hi-C for 3D genome structure analysis of K562 cells</h3> <p><img src="https://media.springernature.com/full/springer-static/image/art%3A10.1038%2Fs41588-018-0111-2/MediaObjects/41588_2018_111_Fig3_HTML.jpg?as=webp" alt="Fig3"></p> <div class="custom-block note"><p class="custom-block-title">Fig3. DLO Hi-C 数据分析工作流程和 DLO Hi-C、in situ Hi-C、in situ DLO Hi-C、Hi-C 和 DNase Hi-C 用于 K562 细胞 3D 基因组结构分析的比较。</p> <p><strong>a.</strong> DLO Hi-C数据分析的工作流程，包括linker过滤、比对、去除冗余和自连接，以及标准化。<br> <strong>b.</strong> 五种Hi-C方法归一化相互作用矩阵的皮尔逊相关系数。<br> <strong>c.</strong> 比较DLO Hi-C，downsampled in situ DLO Hi-C，downsampled in situ Hi-C，Hi-C和DNase Hi-C在不同分辨率下的K562基因组相互作用的热图(1Mb for the entire genome, 100kb for the individual chromosome, and 10kb for the selected regions)。</p></div> <h3 id="fig4-consistency-of-a-b-compartments-tads-and-chromatin-loops-between-dlo-hi-c-in-situ-dlo-hi-c-and-in-situ-hi-c"><a href="#fig4-consistency-of-a-b-compartments-tads-and-chromatin-loops-between-dlo-hi-c-in-situ-dlo-hi-c-and-in-situ-hi-c" class="header-anchor">#</a> Fig4. Consistency of A/B compartments, TADs, and chromatin loops between DLO Hi-C, in situ DLO Hi-C, and in situ Hi-C</h3> <p><img src="https://media.springernature.com/full/springer-static/image/art%3A10.1038%2Fs41588-018-0111-2/MediaObjects/41588_2018_111_Fig4_HTML.jpg?as=webp" alt="Fig4"></p> <div class="custom-block note"><p class="custom-block-title">Fig4. DLO Hi-C、in situ DLO Hi-C 和 in situ Hi-C 之间 A/B compartments、TAD 和染色质 loops 的一致性</p> <p><strong>a-c.</strong> DLO Hi-C（253 million raw reads）、in situ DLO Hi-C（632 million raw reads)和in situ Hi-C(1.37 billion raw reads）之间的A/B compartments (a)、TAD boundaries (b)和loops (c)的overlap。<br> <strong>d.</strong> in situ DLO Hi-C和in situ Hi-C在5-kb分辨率的示例染色质loop区域；染色质loops在归一化的相互作用热图中被标记。<br> <strong>e-g.</strong> DLO Hi-C（253 million raw reads）(e)，in situ DLO Hi-C (632 million raw reads) (f)，in situ Hi-C (1.37 billion raw reads) (g) 在5-kb分辨率下的标准APA。<br> <strong>h.</strong> in situ Hi-C peak list在in situ DLO Hi-C 5-kb分辨率交互图（K562）上的APA图。</p></div> <h3 id="fig5-detection-of-chromosomal-translocations-in-thp-1-cells"><a href="#fig5-detection-of-chromosomal-translocations-in-thp-1-cells" class="header-anchor">#</a> Fig5. Detection of chromosomal translocations in THP-1 cells</h3> <p><img src="https://media.springernature.com/full/springer-static/image/art%3A10.1038%2Fs41588-018-0111-2/MediaObjects/41588_2018_111_Fig5_HTML.jpg?as=webp" alt="Fig5"></p> <div class="custom-block note"><p class="custom-block-title">Fig5. 检测 THP-1 细胞中的染色体易位</p></div></div></div>  <div class="page-edit"><!----> <div class="tags"><a href="/tags/?tag=%E4%B8%89%E7%BB%B4%E5%9F%BA%E5%9B%A0%E7%BB%84" title="标签">#三维基因组</a></div> <div class="last-updated"><span class="prefix">更新时间:</span> <span class="time">2023/06/16, 10:28:34</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/b55e03/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">文献阅读 --- Systematic comparison of sequencing-based spatial transcriptomic methods</div></a> <a href="/pages/c7adb0/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">文献阅读 --- A systematic evaluation of single-cell RNA-sequencing imputation methods</div></a></div> <div class="page-nav"><p class="inner"><span class="prev">
