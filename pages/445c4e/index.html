DOI: <a href="https://doi.org/10.1038/s41592-024-02463-8" target="_blank" rel="noopener noreferrer">https://doi.org/10.1038/s41592-024-02463-8<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a><br>
Cite: Zhong, C., Ang, K.S. &amp; Chen, J. Interpretable spatially aware dimension reduction of spatial transcriptomics with STAMP. Nat Methods 21, 2072–2083 (2024).</p> <div class="custom-block note"><p class="custom-block-title">相关阅读</p> <p>微信公众号：<a href="https://mp.weixin.qq.com/s?__biz=MzkwMjM0MzA5MA==&amp;mid=2247488564&amp;idx=1&amp;sn=6be744e931f1942da7d5e028625dd5a0&amp;chksm=c0a7a4e9f7d02dff56d0dac53c6dc7747d39d79c919a38e258c55ebf5a297b6e441c455b694a&amp;token=1392147927&amp;lang=zh_CN#rd" target="_blank" rel="noopener noreferrer">文献阅读 | Nature Methods：使用 STAMP 对空间转录组进行可解释的空间感知降维<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a></p></div> <p><strong>作者介绍：</strong></p> <table><thead><tr><th style="text-align:center;">陈金妙</th></tr></thead> <tbody><tr><td style="text-align:center;"><img src="https://research.a-star.edu.sg/wp-content/uploads/2020/11/jinmiao-chen-resized.jpg" width="200"></td></tr> <tr><td style="text-align:center;">新加坡科学技术研究局</td></tr> <tr><td style="text-align:center;"><a href="mailto:jinmiao@gmail.com">jinmiao@gmail.com</a></td></tr></tbody></table> <h2 id="abstract"><a href="#abstract" class="header-anchor">#</a> Abstract</h2> <p>空间转录组学产生具有空间背景的高维基因表达测量。获得此类数据的具有生物学意义的低维表示对于有效解释和下游分析至关重要。在这里，作者提出了主题建模揭示空间模式的空间转录组学分析（STAMP），这是一种基于深度生成模型的可解释的空间感知降维方法，可返回生物相关的低维空间主题和相关基因模块。STAMP 可以分析从单个部分到多个部分、从不同技术到时间序列数据的数据，返回与已知生物域和相关基因模块匹配的主题，其中包含已建立的高排名标记。在肺癌样本中，STAMP 以比原始注释更高的分辨率用支持标记描绘了细胞状态，并发现了集中在肿瘤边缘外部的癌症相关成纤维细胞。在小鼠胚胎发育的时间序列数据中，STAMP 解开了肝脏内红骨髓造血和肝细胞的发育轨迹。STAMP 具有高度可扩展性，可以处理超过 500,000 个细胞。
