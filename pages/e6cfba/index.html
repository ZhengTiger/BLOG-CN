!----></h1>  <div class="theme-vdoing-content content__default"><p>详细说明参考: <a href="https://notes.youngkbt.cn/about/website/index-big-img/" target="_blank" rel="noopener noreferrer">https://notes.youngkbt.cn/about/website/index-big-img/<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a></p> <h2 id="index-md-配置"><a href="#index-md-配置" class="header-anchor">#</a> index.md 配置</h2> <p>打开 <code>.vuepress/index.md</code> 添加以下内容</p> <div class="language-markdown line-numbers-mode"><pre class="language-markdown"><code><span class="token front-matter-block"><span class="token punctuation">---</span>
<span class="token front-matter yaml language-yaml"><span class="token key atrule">home</span><span class="token punctuation">:</span> <span class="token boolean important">true</span>
<span class="token key atrule">heroText</span><span class="token punctuation">:</span> TigerZ の 知识宝库
<span class="token key atrule">tagline</span><span class="token punctuation">:</span> 今天，也是充满希望的一天 <span class="token punctuation">---</span> TigerZ
<span class="token key atrule">pageClass</span><span class="token punctuation">:</span> vdoing<span class="token punctuation">-</span>index<span class="token punctuation">-</span>class
<span class="token key atrule">bannerBg</span><span class="token punctuation">:</span> <span class="token string">'img/bannerBg.gif'</span></span>
<span class="token punctuation">---</span></span>

<span class="token tag"><span class="token tag"><span class="token punctuation">&lt;</span>ClientOnly</span><span class="token punctuation">&gt;</span></span>
  <span class="token tag"><span class="token tag"><span class="token punctuation">&lt;</span>IndexBigImg</span> <span class="token punctuation">/&gt;</span></span>
<span class="token tag"><span class="token tag"><span class="token punctuation">&lt;/</span>ClientOnly</span><span class="token punctuation">&gt;</span></span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br><span class="line-number">2</span><br><span class="line-number">3</span><br><span class="line-number">4</span><br><span class="line-number">5</span><br><span class="line-number">6</span><br><span class="line-number">7</span><br><span class="line-number">8</span><br><span class="line-number">9</span><br><span class="line-number">10</span><br><span class="line-number">11</span><br></div></div><h2 id="themeconfig-ts-配置"><a href="#themeconfig-ts-配置" class="header-anchor">#</a> themeConfig.ts 配置</h2> <p>打开 <code>.vuepress/config/themeConfig.ts</code> 添加以下内容</p> <div class="language-typescript line-numbers-mode"><pre class="language-typescript"><code><span class="token keyword">export</span> <span class="token keyword">default</span> <span class="token operator">&lt;</span>VdoingThemeConfig<span class="token operator">&gt;</span><span class="token punctuation">{</span>
  <span class="token comment">// body背景大图</span>
  bodyBgImg<span class="token operator">:</span> <span class="token punctuation">[</span><span class="token string">&quot;/img/bodyBgImg/DNF1.jpg&quot;</span><span class="token punctuation">]</span><span class="token punctuation">,</span> <span class="token comment">// body背景大图，单张图片使用String，多张图片使用Array</span>
  bodyBgImgOpacity<span class="token operator">:</span> <span class="token number">1</span><span class="token punctuation">,</span> <span class="token comment">// body背景图透明度</span>
  bodyBgImgInterval<span class="token operator">:</span> <span class="token number">15</span><span class="token punctuation">,</span> <span class="token comment">// body有多张背景大图时的切换间隔</span>

  <span class="token comment">// 首页大图片配置</span>
  indexImg<span class="token operator">:</span> <span class="token punctuation">{</span>

    descFontSize<span class="token operator">:</span> <span class="token string">&quot;1.4rem&quot;</span><span class="token punctuation">,</span> <span class="token comment">// desc 的字体大小，默认 1.4rem。提示：原主题是 1.1rem</span>
    descFadeInTime<span class="token operator">:</span> <span class="token number">200</span><span class="token punctuation">,</span> <span class="token comment">// 描述的淡入效果持续时间，descFade 为 true 生效，默认 200 毫秒</span>
    descFadeOutTime<span class="token operator">:</span> <span class="token number">100</span><span class="token punctuation">,</span> <span class="token comment">// 描述的淡出效果持续时间，descFade 为 true 生效，默认 100 毫秒</span>
    descNextTime<span class="token operator">:</span> <span class="token number">800</span><span class="token punctuation">,</span> <span class="token comment">// 当有多个 desc 时，一个 desc 展示完后或准备开始时，多少时间后出现下一个 desc，默认 800 毫秒</span>
    bubble<span class="token operator">:</span> <span class="token boolean">false</span><span class="token punctuation">,</span> <span class="token comment">// 是否开启图片的气泡效果，默认为 false</span>
    bubblePosition<span class="token operator">:</span> <span class="token number">0</span><span class="token punctuation">,</span> <span class="token comment">// 气泡效果的位置，范围：0-100，不同数值代表不同的起始位置，0是整个图片，50是半张图（一半的下方）。bubble 为 true 生效。默认是 0</span>
