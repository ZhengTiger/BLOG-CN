DOI: <a href="https://doi.org/10.1016/j.celrep.2021.110131" target="_blank" rel="noopener noreferrer">https://doi.org/10.1016/j.celrep.2021.110131<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a><br>
Cite: Cheung V, Chung P, Bjorni M, Shvareva VA, Lopez YC, Feinberg EH. Virally encoded connectivity transgenic overlay RNA sequencing (VECTORseq) defines projection neurons involved in sensorimotor integration. <em>Cell Rep</em>. 2021 Dec 21;37(12):110131.</p> <div class="custom-block note"><p class="custom-block-title">相关阅读</p> <p>微信公众号：<a href="https://mp.weixin.qq.com/s?__biz=MzkwMjM0MzA5MA==&amp;mid=2247484138&amp;idx=1&amp;sn=e45cc0eeb488142bfe0d5ec9e8fb0051&amp;chksm=c0a7b237f7d03b212a6b78176e726c8505b1b1e9c57eaa4cc1da626f22569d8a2d86e8f1463b&amp;token=1341494096&amp;lang=zh_CN#rd" target="_blank" rel="noopener noreferrer">文献阅读：海马腹侧网络的环路和分子结构<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a></p></div> <p><strong>作者介绍：</strong></p> <table><thead><tr><th style="text-align:center;">Evan Feinberg</th></tr></thead> <tbody><tr><td style="text-align:center;"><img src="https://researcherprofiles.org/profile/Modules/CustomViewPersonGeneralInfo/PhotoHandler.ashx?NodeID=173647&amp;cachekey=80c74969-de15-4a48-beba-bbad64032b2f" width="200"></td></tr> <tr><td style="text-align:center;">University of California San Francisco</td></tr> <tr><td style="text-align:center;"><a href="mailto:evan.feinberg@ucsf.edu">evan.feinberg@ucsf.edu</a></td></tr></tbody></table> <h2 id="abstract"><a href="#abstract" class="header-anchor">#</a> Abstract</h2> <p>行为来自于整个大脑的协同活动。因此，现代神经科学的一个主要焦点是定义连接不同大脑区域的投射神经元的生理学和行为作用。单细胞RNA测序促进了这些努力，揭示了细胞生理学的分子决定因素和标记，这些标记使遗传上的靶向扰动，如光遗传学，但现有的投射群体的测序方法是低通量、艰苦和昂贵的。我们开发了一种直接的、multiplexed的方法，病毒编码的连接转基因覆盖RNA测序(Virally Encoded Connectivity Transgenic Overlay RNA sequencing，VECTORseq)。VECTORseq重新利用商业逆转录感染病毒，通常用于表达功能性转基因，e.g.，重组酶和荧光蛋白，通过处理病毒转基因mRNA作为条形码。VECTORseq 与不同的病毒家族兼容，在一次测序运行中解析具有不同投射目标的多个群体，并识别皮质和皮质下兴奋性和抑制性投射群体。我们的研究为基于连通性的神经元亚型高通量识别提供了路线图。</p> <h2 id="results"><a href="#results" class="header-anchor">#</a> Results</h2> <h3 id="fig1-schematic-of-vectorseq"><a href="#fig1-schematic-of-vectorseq" class="header-anchor">#</a> Fig1. Schematic of VECTORseq</h3> <p><img src="https://www.cell.com/cms/attachment/e23ba31d-602d-4b6e-981b-a1bb45f84c69/gr1_lrg.jpg" alt="Fig1"></p> <div class="custom-block note"><p class="custom-block-title">Fig1. VECTORseq 方法示意图</p> <p>将逆行感染病毒（彩色注射器）注射到大脑结构（此示意图中小鼠大脑的矢状部分）中，这些结构由来自单一起源结构的不同投射神经元（定向箭头）靶向，将为每个结构标记独特的病毒编码 RNA 条形码。然后解离组织，将细胞（大点）分选成液滴，珠子（小点）涂有条形码寡核苷酸，用细胞特异性条形码标记每个细胞中的所有 RNA，包括病毒转基因（条形码）。一旦根据细胞特异性条形码鉴定了来自每个细胞的 RNA 并且细胞被聚类，病毒条形码的表达就可以叠加，以将每个细胞类型簇分配到其投影目标和功能特性。</p></div> <h3 id="fig2-vectorseq-of-v1-projection-neurons"><a href="#fig2-vectorseq-of-v1-projection-neurons" class="header-anchor">#</a> Fig2. VECTORseq of V1 projection neurons</h3> <p><img src="https://www.cell.com/cms/attachment/f4f45d7a-7161-4856-9af5-af2bebc4ebc9/gr2_lrg.jpg" alt="Fig2"></p> <div class="custom-block note"><p class="custom-block-title">Fig2. V1 投射神经元的 VECTORseq</p> <p><strong>A.</strong> 实验方法的示意图。将逆行病毒注射到 left V1的三个主要投射靶点：SC、Str和V1。为了标记SC和对侧SC的注射部位，共注射稀释的AAV1-hSyn-TurboRFP（没有显示）。为了提供用于测序的显微切割和信号放大的基准，如果需要，左 V1 还注射了 AAV1-CAG-FLEX-tdTomato 和 AAV1-EF1α-fDIO-EYFP（未显示）。 3周后，解剖左侧V1，分离细胞，进行单细胞测序。<br> <strong>B.</strong> V1测序数据的UMAP说明了该数据集中不同的主要细胞类型。<br> <strong>C.</strong> 主要皮质细胞类型的富集和差异表达基因以及逆行病毒转基因的分布。注意转基因和内源性基因表达的不同尺度。</p></div> <h3 id="fig3-vectorseq-of-sc"><a href="#fig3-vectorseq-of-sc" class="header-anchor">#</a> Fig3. VECTORseq of SC</h3> <p><img src="https://www.cell.com/cms/attachment/8a9197f9-227e-4c24-b696-90018d43d804/gr3_lrg.jpg" alt="Fig3"></p> <div class="custom-block note"><p class="custom-block-title">Fig3. 上丘(SC)的 VECTORseq</p> <p><strong>A.</strong> 实验方法的示意图。将逆行病毒注射到 left LP、left CnF、right PPRF中。3周后，解剖left SC，分离细胞核，染色，按NeuN/Rbfox3表达分选，单细胞测序。<br> <strong>B.</strong> SC测序数据的UMAP和聚类。<br> <strong>C.</strong> 不同细胞类型的标记物覆盖(Flt1, endothelia; Mog, oligodendrocytes; C1qa, microglia; Aqp4, astrocytes, Slc17a6, excitatory neurons; Gad2, inhibitory neurons)显示数据集中神经元富集，神经元簇中存在转基因基因。<br> <strong>D.</strong> SC excitatory(Slc17a6+)神经元的UMAP。<br> <strong>E.</strong> 逆行病毒转基因在主要SC兴奋细胞类型中富集和差异表达基因的分布。</p></div> <h3 id="fig4-analysis-of-candidate-marker-gene-expression-in-different-sc-projection-populations"><a href="#fig4-analysis-of-candidate-marker-gene-expression-in-different-sc-projection-populations" class="header-anchor">#</a> Fig4. Analysis of candidate marker gene expression in different SC projection populations</h3> <p><img src="https://www.cell.com/cms/attachment/a6fde180-2eb2-4272-a5be-4761e1035c8b/gr4_lrg.jpg" alt="Fig4"></p> <div class="custom-block note"><p class="custom-block-title">Fig4. 不同 SC 投射群体中候选标记基因的表达分析</p> <p><strong>A.</strong> 左图，实验方案示意图。AAVrg-Cre注射到 right PPRF。3周后，灌注小鼠，对 left SC深层进行RNAscope检测。右图，代表性的图像。左中图为Cre的表达。箭头表示Cre+细胞。右中图为Pitx2的表达。箭头表示Cre+和Pitx2+共表达细胞。<br> <strong>BC.</strong> 与(A)一样，但 Pmfbp1 在深层 SC 中 PPRF 投射的(B)和 lp 投射的(C)神经元中的表达。<br> <strong>D.</strong> 与(A)-(C)一样，但 Gda 在浅表 lp 投射神经元中的表达。<br> <strong>EF.</strong> 与(A)-(D)一样，但 Rxfp2 在深层 SC 的 lp 投射(E)和 PPRF 投射(F)神经元中的表达。</p></div> <h3 id="fig5-vectorseq-of-ventral-midbrain-inhibitory-neurons"><a href="#fig5-vectorseq-of-ventral-midbrain-inhibitory-neurons" class="header-anchor">#</a> Fig5. VECTORseq of ventral midbrain inhibitory neurons</h3> <p><img src="https://www.cell.com/cms/attachment/899f8755-69f8-4efc-8aec-9b422f8a6bc1/gr5_lrg.jpg" alt="Fig5"></p> <div class="custom-block note"><p class="custom-block-title">Fig5. 腹侧中脑抑制性神经元的 VECTORseq</p> <p><strong>A.</strong> 逆行病毒被注射到右侧脑室中，右侧中脑脉络核（MLR）和左侧脊髓中央灰质（SC）。三周后，取下右侧腹侧中脑，分离核团，进行染色并进行单细胞测序。<br> <strong>B.</strong> 单细胞测序数据和聚类的UMAP图。<br> <strong>C.</strong> 抑制性（Gad1+/Gad2+）神经元的UMAP图。<br> <strong>D.</strong> 具有病毒转基因或示例标记基因表达的抑制性神经元的UMAP图。<br> <strong>E.</strong> 主要腹侧中脑抑制性细胞类型的富集和差异表达基因，以及病毒编码的转基因分布。</p></div> <h3 id="fig6-analysis-of-candidate-marker-gene-expression-in-zi-→-vm-population"><a href="#fig6-analysis-of-candidate-marker-gene-expression-in-zi-→-vm-population" class="header-anchor">#</a> Fig6. Analysis of candidate marker gene expression in ZI → VM population</h3> <p><img src="https://www.cell.com/cms/attachment/c06fbc23-2ff4-4d7d-b17a-da0ddcca2583/gr6_lrg.jpg" alt="Fig6"></p> <div class="custom-block note"><p class="custom-block-title">Fig6. ZI → VM 群体中候选标记基因的表达分析</p> <p>左图，AAVrg-Cre 在右侧脑室中进行注射。三周后，小鼠被灌流，并在 ZI 上进行 RNAscope 实验。右图，代表性图像。中间左侧图像显示 Cre 的表达。箭头指示 Cre+ 细胞。中间右侧图像显示 Pax6 的表达。箭头指示同时为 Cre+ 和 Pax6+ 的细胞。</p></div></div></div>  <div class="page-edit"><!----> <div class="tags"><a href="/tags/?tag=%E7%A5%9E%E7%BB%8F%E7%94%9F%E7%89%A9%E5%AD%A6" title="标签">#神经生物学</a></div> <div class="last-updated"><span class="prefix">更新时间:</span> <span class="time">2024/02/19, 20:54:06</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/d5ec9f/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">文献阅读 --- Cellular anatomy of the mouse primary motor cortex</div></a> <a href="/pages/0be7e3/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">文献阅读 --- Single-neuron projectome of mouse prefrontal cortex</div></a></div> <div class="page-nav"><p class="inner"><span class="prev">
