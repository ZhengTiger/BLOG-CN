DyHQRmOSfQZ1Fy7MHBTGB6J/Djq6p3OxyO2cB+4Car7v/o3GXgfAkj23+x9ID1Teoamo/SXcbvSf2PX7Vc8DdCmE1vN9di+32P9/5YR3vLnhCVGUWBjEkr3yh4H8v9CzmsbdhzOKzsJKM90iFdaTMjRPhGVsakRvOaRidljo6H6G7j+ctrJpsP+4COhDIl0La2+FS4+5mlocBaXY5QnGZysIBYoeSsl5qQzrSj/cgNrfuEzlWBfwA+EjrZyWUvpAAAAABJRU5ErkJggg==">本站-图床<!----></h1>  <div class="theme-vdoing-content content__default"><p>本站使用了 <a href="https://github.com/XPoet/picx" target="_blank" rel="noopener noreferrer">PicX<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a> 图床，配置方法参考 <a href="https://picx-docs.xpoet.cn/usage-guide/get-start.html" target="_blank" rel="noopener noreferrer">PicX图床使用指南<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a></p> <h2 id="为什么要使用图床"><a href="#为什么要使用图床" class="header-anchor">#</a> 为什么要使用图床?</h2> <p>写博客文章时，图片的上传和存放是一个问题，有的朋友可能会把图片放到和博客同一个仓库当中，使用相对路径来引用，这样后期维护起来会比较麻烦。还有的朋友会在不同的平台发布同一篇文章，这样一来每个平台都要上传图片，为了解决这些问题，比较推荐的做法是把图片统一上传到一个在线的第三方静态资源库中，我们把这个资源库称为图床，其返回一个图片的URL，使用<code>markdown+图片url</code>的方式写作文章，一次编写，到处使用~</p> <p><code>PicX</code> 是基于 <code>GitHub API</code> 开发的图床神器，图片外链使用 <code>jsDelivr</code> 进行 <code>CDN</code> 加速。免下载、免安装，打开网站即可直接使用。免费、稳定、高效。</p> <h2 id="picx-配置"><a href="#picx-配置" class="header-anchor">#</a> PicX 配置</h2> <h3 id="创建-github-token"><a href="#创建-github-token" class="header-anchor">#</a> 创建 GitHub Token</h3> <p>PicX 的图床服务依赖于 GitHub Token，在开始使用之前，你必须先创建一个带有 <code>repo</code> 权限的 <code>GitHub Token</code>。</p> <p>点击 <a href="https://github.com/settings/tokens/new" target="_blank" rel="noopener noreferrer">https://github.com/settings/tokens/new<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a> 快速新建 <code>GitHub Token</code></p> <p><img src="https://picx-docs.xpoet.cn/assets/img-9.sNyX8yes.png" alt="Fig1"></p> <p>点击 <code>Generate token</code> 按钮，生成 GitHub Token</p> <p><img src="https://picx-docs.xpoet.cn/assets/img-10.k2EwdOJ_.png" alt="Fig2"></p> <p><img src="https://picx-docs.xpoet.cn/assets/img-11.geTaC6Rn.png" alt="Fig3"></p> <div class="custom-block warning"><p class="custom-block-title">注意</p> <p>新生成的 Token 只会显示一次，请妥善保存，如有遗失，重新生成即可。</p></div> <h3 id="配置图床"><a href="#配置图床" class="header-anchor">#</a> 配置图床</h3> <p><strong>一键自动配置</strong></p> <p>填写 GitHub Token，点击 “一键自动配置” 按钮会自动创建 GitHub 仓库，并完成仓库、分支和目录之间的绑定。</p> <ul><li>自动配置创建的仓库：<code>picx-images-hosting</code></li> <li>自动配置创建的分支：<code>master</code></li> <li>自动配置创建的目录：<code>yyyyMMdd</code> (例如：<code>20230403</code>)</li></ul> <p>如果你刚开始使用 PicX，那么推荐使用一键自动配置，非常方便。当然你也可以随时切换成手动配置。</p> <p><img src="https://picx-docs.xpoet.cn/assets/img-17.Cn3ljBG3.png" alt="Fig4"></p> <h2 id="上传图片"><a href="#上传图片" class="header-anchor">#</a> 上传图片</h2> <p>建议上传图片时选择<code>新建目录</code>的方式，PicX 会自动创建输入路径的所有文件，这样图床文件夹结构更清晰，方便找到图片。</p> <p><img src="https://ZhengTiger.github.io/picx-images-hosting/100-%E5%85%B3%E4%BA%8E/02-%E5%85%B3%E4%BA%8E-%E6%9C%AC%E7%AB%99/07-%E6%9C%AC%E7%AB%99-%E5%9B%BE%E5%BA%8A/Fig01.326xmxmtj4a0.webp" alt="Fig5"></p> <p><img src="https://ZhengTiger.github.io/picx-images-hosting/100-%E5%85%B3%E4%BA%8E/02-%E5%85%B3%E4%BA%8E-%E6%9C%AC%E7%AB%99/07-%E6%9C%AC%E7%AB%99-%E5%9B%BE%E5%BA%8A/Fig02.2j16zfw2z1c0.webp" alt="Fig6"></p></div></div>  <div class="page-edit"><!----> <div class="tags"><a href="/tags/?tag=%E6%9C%AC%E7%AB%99" title="标签">#本站</a></div> <div class="last-updated"><span class="prefix">更新时间:</span> <span class="time">2024/09/02, 20:17:14</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/c4fda3/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">本站-花里胡哨的插件</div></a> <!----></div> <div class="page-nav"><p class="inner"><span class="prev">
