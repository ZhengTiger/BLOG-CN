Cite: Sun, L., Tang, Y., Yan, K. et al. Differences in neurotropism and neurotoxicity among retrograde viral tracers. Mol Neurodegeneration 14, 8 (2019).</p> <div class="custom-block note"><p class="custom-block-title">相关阅读</p> <p>微信公众号：<a href="https://mp.weixin.qq.com/s?__biz=MzkwMjM0MzA5MA==&amp;mid=2247487762&amp;idx=1&amp;sn=6eb0c7024f0d5819c08f2b65d8d53e00&amp;chksm=c0a7a1cff7d028d97636eede0f9828d6f5f68e860226f2778cba748aa497c86a4351f5ce15ac&amp;scene=178&amp;cur_album_id=3018334051130408969#rd" target="_blank" rel="noopener noreferrer">文献阅读：逆行病毒示踪剂之间的神经嗜性和神经毒性的差异<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a></p></div> <p><strong>作者介绍：</strong></p> <table><thead><tr><th style="text-align:center;">曹罡</th> <th style="text-align:center;">戴金霞</th></tr></thead> <tbody><tr><td style="text-align:center;"><img src="http://hzaml.hzau.edu.cn/__local/D/6A/CD/18DE8CF2DF6750578AEC844C744_80A8E1BB_23A53.png" width="200"></td> <td style="text-align:center;"><img src="https://faculty.hzau.edu.cn/_resources/group1/M00/00/01/00WEs2BmxZOABuodAAF-5OffrpE977.png?randomid=1717078699030" width="200"></td></tr> <tr><td style="text-align:center;">华中农业大学</td> <td style="text-align:center;">华中农业大学</td></tr> <tr><td style="text-align:center;"><a href="mailto:gcao@mail.hzau.edu.cn">gcao@mail.hzau.edu.cn</a></td> <td style="text-align:center;"><a href="mailto:jxdai@mail.hzau.edu.cn">jxdai@mail.hzau.edu.cn</a></td></tr></tbody></table> <h2 id="abstract"><a href="#abstract" class="header-anchor">#</a> Abstract</h2> <p><strong>Background:</strong> 基于嗜神经病毒的示踪剂已广泛应用于神经环路的绘制和操作。然而，它们的神经嗜性和神经毒性仍有待充分确定。<br> <strong>Methods:</strong> 通过神经环路示踪，我们系统地比较了不同的跨多突触（multi-trans-synaptic）和单突触（mono-synaptic）逆行病毒示踪剂，包括伪狂犬病毒（PRV）、狂犬病毒（RV）和新设计的逆行腺相关病毒（rAAV2-retro）示踪剂之间的神经嗜性差异。利用 scRNAseq 分析寻找神经嗜性差异的原因，并比较由糖蛋白缺失的 RV（RV-ΔG）和 rAAV2-retro 病毒感染引起的细胞毒性。采用免疫组化方法评价病毒毒性诱导的小胶质细胞活化和神经元蛋白的变化。<br> <strong>Results:</strong> 跨多突触逆行病毒示踪剂 PRV 和 RV 在用于从腘淋巴结追踪中枢神经环路时，表现出不同的神经嗜性。单突触逆行示踪剂，包括 RV-ΔG 和 rAAV2-retro，在应用于追踪下丘脑外侧区和内侧视前核的输入时，表现出不同的神经嗜性。rAAV2-retro 在大脑皮层中表现出偏好，而 RV-ΔG 更倾向于标记基底神经节和下丘脑。值得注意的是，当将 rAAV2-retro 注射到背外侧膝状核来标记初级视觉皮层时，我们发现它们对第 5 层和第 6 层的特异性丘脑神经层有明显的偏好。在对 RV 抵抗性神经元进行 TVA 受体基因的补充后，使得 EnvA-pseudotyped RV 感染成为可能，从而支持受体与病毒神经嗜性的关联。此外，无论是 RV-ΔG 还是 rAAV2-retro 在注射部位和逆行标记部位均表现出神经毒性影响，但 RV-ΔG 感染的变化更为显著。最后，我们证明了通过结合 rAAV2-retro、RV 和 rAAV 示踪剂，可以实现对特定目标核心进行更全面的高阶环路追踪的概念验证策略。<br> <strong>Conclusions:</strong> 不同的跨多突触和单突触逆行病毒示踪剂在大脑的某些区域表现出不同的神经嗜性，甚至皮层偏好。与 rAAV2-retro 相比，RV-ΔG 感染下观察到更多的神经毒性。通过结合 rAAV2-retro、RV 和 rAAV 示踪剂，可以实现高阶环路示踪。我们的研究结果为适当应用病毒示踪剂来描绘景观和解剖神经网络的功能提供了重要的参考。<br> <strong>Keywords:</strong> Neurotropic Virus, Retrograde tracing, pseudorabies virus (PRV), rabies virus (RV), rAAV2-retro, Neurotropism, Neurotoxicity, Multi-trans-synaptic Tracing, Mono-synaptic Tracing, RNA Sequencing</p></div></div>  <div class="page-edit"><!----> <div class="tags"><a href="/tags/?tag=%E7%A5%9E%E7%BB%8F%E7%94%9F%E7%89%A9%E5%AD%A6" title="标签">#神经生物学</a></div> <div class="last-updated"><span class="prefix">更新时间:</span> <span class="time">2024/07/27, 10:10:31</span></div></div> <div class="page-nav-wapper"><div class="page-nav-centre-wrap"><a href="/pages/af94c8/" class="page-nav-centre page-nav-centre-prev"><div class="tooltip">文献阅读 --- Shared and distinct transcriptomic cell types across neocortical areas</div></a> <a href="/pages/da828f/" class="page-nav-centre page-nav-centre-next"><div class="tooltip">文献阅读 --- High-Throughput Mapping of Long-Range Neuronal Projection Using In Situ Sequencing</div></a></div> <div class="page-nav">
