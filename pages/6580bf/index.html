Doc: <a href="http://rich-iannone.github.io/DiagrammeR/index.html" target="_blank" rel="noopener noreferrer">http://rich-iannone.github.io/DiagrammeR/index.html<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a></p> <h2 id="diagrammer-介绍"><a href="#diagrammer-介绍" class="header-anchor">#</a> DiagrammeR 介绍</h2> <div align="center"><img src="http://rich-iannone.github.io/DiagrammeR/reference/figures/logo.svg" width="200"></div> <p>使用 <code>DiagrammeR</code> 包，您可以创建、修改、分析和可视化网络图（network graph diagrams）。输出可以合并到 <code>R Markdown</code> 文档中、与 <code>Shiny web apps</code> 集成、转换为其他图形格式或导出为图像文件。</p> <div class="center-container"><p><img src="http://rich-iannone.github.io/DiagrammeR/reference/figures/simple_graph.png" alt=""></p></div><p>上面的图表可以使用 <code>DiagrammeR</code> 函数的组合来创建：</p> <div class="language-r line-numbers-mode"><pre class="language-r"><code>example_graph <span class="token operator">&lt;-</span>
  create_graph<span class="token punctuation">(</span><span class="token punctuation">)</span> <span class="token percent-operator operator">%&gt;%</span>
  add_pa_graph<span class="token punctuation">(</span>
    n <span class="token operator">=</span> <span class="token number">50</span><span class="token punctuation">,</span> m <span class="token operator">=</span> <span class="token number">1</span><span class="token punctuation">,</span>
    set_seed <span class="token operator">=</span> <span class="token number">23</span>
  <span class="token punctuation">)</span> <span class="token percent-operator operator">%&gt;%</span>
  add_gnp_graph<span class="token punctuation">(</span>
    n <span class="token operator">=</span> <span class="token number">50</span><span class="token punctuation">,</span> p <span class="token operator">=</span> <span class="token number">1</span><span class="token operator">/</span><span class="token number">100</span><span class="token punctuation">,</span>
    set_seed <span class="token operator">=</span> <span class="token number">23</span>
  <span class="token punctuation">)</span> <span class="token percent-operator operator">%&gt;%</span>
  join_node_attrs<span class="token punctuation">(</span>df <span class="token operator">=</span> get_betweenness<span class="token punctuation">(</span>.<span class="token punctuation">)</span><span class="token punctuation">)</span> <span class="token percent-operator operator">%&gt;%</span>

  colorize_node_attrs<span class="token punctuation">(</span>
    node_attr_from <span class="token operator">=</span> total_degree<span class="token punctuation">,</span>
    node_attr_to <span class="token operator">=</span> fillcolor<span class="token punctuation">,</span>
    palette <span class="token operator">=</span> <span class="token string">&quot;Greens&quot;</span><span class="token punctuation">,</span>
    alpha <span class="token operator">=</span> <span class="token number">90</span>
  <span class="token punctuation">)</span> <span class="token percent-operator operator">%&gt;%</span>
  rescale_node_attrs<span class="token punctuation">(</span>
    node_attr_from <span class="token operator">=</span> betweenness<span class="token punctuation">,</span>
    to_lower_bound <span class="token operator">=</span> <span class="token number">0.5</span><span class="token punctuation">,</span>
    to_upper_bound <span class="token operator">=</span> <span class="token number">1.0</span><span class="token punctuation">,</span>
    node_attr_to <span class="token operator">=</span> height

</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><p><code>DiametermeR</code> 的图形函数允许您创建图形对象、修改这些图形、从图形中获取信息、创建一系列图形以及执行许多其他有用的操作。这使得可以使用表格数据集中的可用数据生成网络图。两个专用数据框包含节点数据和属性（node data frames）以及具有关联边缘属性的边缘（edge data frames）。由于属性始终与节点和边定义一起保存（在图形对象本身内），因此我们可以轻松使用它们。</p> <h2 id="installation"><a href="#installation" class="header-anchor">#</a> Installation</h2> <p><code>DiametermeR</code> 在 R 环境中使用。
如果您没有安装 R，可以从 <a href="https://cran.r-project.org/" target="_blank" rel="noopener noreferrer">Comprehensive R Archive Network (CRAN)<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a> 获取。</p> <p>您可以使用 <code>devtools</code> 包从 <code>GitHub</code> 安装 <code>DiagrammeR</code> 的开发版本。</p> <div class="language-r line-numbers-mode"><pre class="language-r"><code>devtools<span class="token operator">::</span>install_github<span class="token punctuation">(</span><span class="token string">&quot;rich-iannone/DiagrammeR&quot;</span><span class="token punctuation">)</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><p>或者，从 <code>CRAN</code> 获取。</p> <div class="language-r line-numbers-mode"><pre class="language-r"><code>install.packages<span class="token punctuation">(</span><span class="token string">&quot;DiagrammeR&quot;</span><span class="token punctuation">)</span>
</code></pre> <div class="line-numbers-wrapper"><span class="line-number">1</span><br></div></div><p>如果您遇到错误、有使用问题或想要分享想法以改进此软件包，请随时提出<a href="https://github.com/rich-iannone/DiagrammeR/issues" target="_blank" rel="noopener noreferrer">问题<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a>。</p> <h2 id="documentation"><a href="#documentation" class="header-anchor">#</a> Documentation</h2> <h3 id="get-start"><a href="#get-start" class="header-anchor">#</a> Get start</h3> <p>官网教程: <a href="http://rich-iannone.github.io/DiagrammeR/#graph-basics" target="_blank" rel="noopener noreferrer">http://rich-iannone.github.io/DiagrammeR/#graph-basics<span><svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" x="0px" y="0px" viewBox="0 0 100 100" width="15" height="15" class="icon outbound"><path fill="currentColor" d="M18.8,85.1h56l0,0c2.2,0,4-1.8,4-4v-32h-8v28h-48v-48h28v-8h-32l0,0c-2.2,0-4,1.8-4,4v56C14.8,83.3,16.6,85.1,18.8,85.1z"></path> <polygon fill="currentColor" points="45.7,48.7 51.3,54.3 77.2,28.5 77.2,37.2 85.2,37.2 85.2,14.9 62.8,14.9 62.8,22.9 71.5,22.9"></polygon></svg> <span class="sr-only">(opens new window)</span></span></a> <br>
